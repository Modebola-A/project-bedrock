              value: "jdbc:postgresql://project-bedrock-cluster-postgres.c2nq2esy696s.us-east-1.rds.amazonaws.com:5432/orders"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: orders-db-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orders-db-secret
                  key: password
            - name: SPRING_RABBITMQ_HOST
              value: "rabbitmq"
          resources:
            requests:
              cpu: 128m
              memory: 512Mi
            limits:
              cpu: 256m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
